name: publish
# Build + push the sidecar image to GHCR on push to main, so the deploy host can
# pull it (host GHCR creds are read-only — it cannot build/push itself).
on:
  push:
    branches: [main]

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/arnonzamir/name-phonetics:latest
            ghcr.io/arnonzamir/name-phonetics:${{ github.sha }}
